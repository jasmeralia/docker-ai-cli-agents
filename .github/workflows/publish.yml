name: Publish Image

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version metadata
        id: versions
        run: |
          echo "release_version=$(jq -r '.release_version' versions.json)" >> "$GITHUB_OUTPUT"
          echo "codex_version=$(jq -r '.codex.version' versions.json)" >> "$GITHUB_OUTPUT"
          echo "ccusage_version=$(jq -r '.ccusage.version' versions.json)" >> "$GITHUB_OUTPUT"
          echo "codex_usage_version=$(jq -r '.codex_usage.version' versions.json)" >> "$GITHUB_OUTPUT"
          echo "claude_version=$(jq -r '.claude.version' versions.json)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
          labels: |
            org.opencontainers.image.version=${{ steps.versions.outputs.release_version }}
            io.github.docker-ai-cli-agents.release-version=${{ steps.versions.outputs.release_version }}
            io.github.docker-ai-cli-agents.codex-version=${{ steps.versions.outputs.codex_version }}
            io.github.docker-ai-cli-agents.ccusage-version=${{ steps.versions.outputs.ccusage_version }}
            io.github.docker-ai-cli-agents.codex-usage-version=${{ steps.versions.outputs.codex_usage_version }}
            io.github.docker-ai-cli-agents.claude-version=${{ steps.versions.outputs.claude_version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CODEX_VERSION=${{ steps.versions.outputs.codex_version }}
            CCUSAGE_VERSION=${{ steps.versions.outputs.ccusage_version }}
            CODEX_USAGE_VERSION=${{ steps.versions.outputs.codex_usage_version }}
            CLAUDE_VERSION=${{ steps.versions.outputs.claude_version }}
            REPO_RELEASE_VERSION=${{ steps.versions.outputs.release_version }}
            REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.versions.outputs.build_date }}
