name: Tag and Publish

on:
  push:
    branches:
      - master

concurrency:
  group: auto-tag
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tag-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch --tags origin
            latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            major=$(echo "${latest}" | sed 's/v\([0-9]*\)\..*/\1/')
            minor=$(echo "${latest}" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
            patch=$(echo "${latest}" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
            new_tag="v${major}.${minor}.$((patch + 1))"
            echo "Attempt ${attempt}: tagging ${new_tag} (previous: ${latest})"
            if git tag "${new_tag}" && git push origin "${new_tag}"; then
              echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
              echo "release_version=${new_tag#v}" >> "$GITHUB_OUTPUT"
              echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
              echo "Tagged ${new_tag} successfully"
              break
            fi
            echo "Push failed (tag may already exist); retrying after refetch"
            git tag -d "${new_tag}" 2>/dev/null || true
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Failed to push a unique tag after 3 attempts"
              exit 1
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.new_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REPO_RELEASE_VERSION=${{ steps.tag.outputs.release_version }}
            REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.tag.outputs.build_date }}
